name: Generate Client

on:
  push:
    branches: [main]
    paths:
      - POCKET_ID_VERSION
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"

      - name: Install tools
        run: make install-tools

      - name: Generate client
        run: make generate

      - name: Verify build
        run: make verify

      - name: Get version
        id: version
        run: echo "version=$(cat POCKET_ID_VERSION | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Generate API diff
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          prev=$(gh release list --limit 5 --json tagName -q '.[] | .tagName' | grep -v "^${VERSION}$" | head -1)
          if [ -n "$prev" ]; then
            git fetch origin "refs/tags/${prev}:refs/tags/${prev}" 2>/dev/null \
              && git show "${prev}:swagger.yaml" > /tmp/prev-swagger.yaml \
              && git diff --no-index /tmp/prev-swagger.yaml swagger.yaml > api-changes.diff \
              || true
          fi

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Create orphan commit with only the generated code
          git checkout --orphan release-tmp

          # Remove everything from index
          git rm -rf --cached .

          # Add only the files needed for the Go module
          git add -f go.mod go.sum client/ models/ swagger.yaml

          git commit -m "Generated client from Pocket ID ${VERSION}"

          # Delete existing tag/release if they exist
          gh release delete "$VERSION" --yes 2>/dev/null || true
          git push origin ":refs/tags/$VERSION" 2>/dev/null || true

          # Tag and push only the tag
          git tag -f "$VERSION"
          git push origin "refs/tags/${VERSION}" --force

          release_args=("$VERSION" --title "Client $VERSION" --notes "Generated from [Pocket ID $VERSION](https://github.com/pocket-id/pocket-id/releases/tag/$VERSION)")
          if [ -f api-changes.diff ] && [ -s api-changes.diff ]; then
            release_args+=(api-changes.diff)
          fi
          gh release create "${release_args[@]}"
